<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Candidate Login for ISTE Performance Portal. Securely access your assessments and tracked performance.">
    <title>ISTE Aptitude Test</title>
    <link rel="icon" type="image/png" href="./iste.png">
    <style>
        :root {
            --primary-blue: #1976d2;
            --thick-orange: #ef6c00;
            --thick-yellow: #fdd835;
            --bg-body: #f4f6f8;
            --bg-card: #ffffff;
            --text-main: #202124;
            --border: #dadce0;
            --overlay: rgba(0, 0, 0, 0.5);
        }

        html,
        body {
            max-width: 100vw;
            overflow-x: hidden;
            box-sizing: border-box;
        }

        *,
        *:before,
        *:after {
            box-sizing: inherit;
        }

        * {
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
            margin: 0;
            padding: 0;
        }

        .card,
        .container,
        .sidebar {
            width: 100%;
            max-width: 100%;
            overflow-wrap: break-word;
            word-wrap: break-word;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding-top: 70px;
        }

        @media screen and (max-width: 480px) {
            body {
                padding-top: 65px;
                align-items: flex-start;
            }
            .login-card {
                padding: 25px 20px;
                margin: 0 10px;
                max-height: calc(100vh - 80px);
                overflow-y: auto;
            }
            .login-card img {
                width: 50px;
                height: 50px;
            }
            .form-group input {
                padding: 12px;
                font-size: 14px;
            }
            .btn {
                padding: 12px;
                font-size: 14px;
            }
        }

        .app-bar {
            background: var(--primary-blue);
            color: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            border-bottom: 5px solid var(--thick-yellow);
        }

        .login-card {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-top: 8px solid var(--primary-blue);
            border: 1px solid var(--border);
            animation: slideUp 0.5s ease;
        }

        .login-card img {
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 14px;
            color: #555;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fff;
            color: var(--text-main);
            font-size: 16px;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: var(--primary-blue);
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
            margin-top: 10px;
        }

        .btn:hover {
            filter: brightness(1.1);
            transform: scale(1.01);
        }

        /* Captcha Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 340px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        #captchaCanvas {
            background: #f0f0f0;
            border-radius: 6px;
            margin: 15px 0;
            cursor: pointer;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .captcha-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: center;
            font-size: 20px;
            letter-spacing: 4px;
            font-weight: bold;
        }

        .btn:disabled {
            background: #9e9e9e !important;
            cursor: not-allowed !important;
            opacity: 0.5 !important;
            transform: none !important;
            filter: none !important;
        }

        .btn:disabled:hover {
            filter: none !important;
            transform: none !important;
        }

        .error {
            color: #d32f2f;
            font-size: 13px;
            text-align: center;
            margin-top: 15px;
            display: none;
            padding: 10px;
            background: #ffebee;
            border-radius: 4px;
        }

        .error.info {
            background: #fff3e0;
            color: #e65100;
        }

        .tab-toggle {
            display: flex;
            margin-bottom: 25px;
            border: 2px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        .tab-toggle button {
            flex: 1;
            padding: 12px;
            border: none;
            background: #f5f5f5;
            color: #666;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }
        .tab-toggle button.active {
            background: var(--primary-blue);
            color: white;
        }
        .tab-toggle button:hover:not(.active) {
            background: #e8e8e8;
        }
        .form-group {
            position: relative;
        }
        .pwd-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(20%);
            cursor: pointer;
            font-size: 13px;
            color: var(--primary-blue);
            user-select: none;
            font-weight: bold;
        }
        #register-view {
            display: none;
        }
        .select-group select {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fff;
            color: var(--text-main);
            font-size: 16px;
        }
    </style>
</head>

<body>
    <header class="app-bar">
        <img src="sastra.png" alt="SASTRA Logo" style="width:36px; height:36px; object-fit:contain;">
        <img src="iste.png" alt="ISTE Logo" style="width:36px; height:36px; object-fit:contain;">
        <h1>ISTE Aptitude Test</h1>
    </header>

    <div class="login-card">
        <div class="tab-toggle">
            <button id="tab-login" class="active" onclick="showTab('login')">Login</button>
            <button id="tab-register" onclick="showTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <div id="login-view">
            <h2 style="text-align: center; margin-bottom: 30px; font-size: 24px; color: var(--primary-blue);">Student Login</h2>
            <form id="login-form" method="POST" action="/student/login" onsubmit="event.preventDefault(); startLoginFlow();">
                <div class="form-group">
                    <label>Registration ID</label>
                    <input type="text" id="user_id" name="user_id" placeholder="Enter the register no" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter the password" autocomplete="current-password">
                    <span class="pwd-toggle" onclick="togglePwd('password', this)">SHOW</span>
                </div>
                <button type="submit" class="btn" id="login-btn">Authenticate & Login</button>
            </form>
            <div id="error" class="error" {% if error %}style="display:block;"{% endif %}>{% if error %}{{ error }}{% endif %}</div>
        </div>

        <!-- Register Form -->
        <div id="register-view">
            <h2 style="text-align: center; margin-bottom: 25px; font-size: 24px; color: var(--primary-blue);">Student Registration</h2>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="reg-name" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label>Registration ID</label>
                <input type="text" id="reg-userid" placeholder="Enter registration number">
            </div>
            <div class="form-group select-group">
                <label>Year</label>
                <select id="reg-year">
                    <option value="">Select Year</option>
                    <option value="1">1st Year</option>
                    <option value="2">2nd Year</option>
                    <option value="3">3rd Year</option>
                    <option value="4">4th Year</option>
                </select>
            </div>
            <div class="form-group">
                <label>Degree</label>
                <input type="text" id="reg-degree" placeholder="e.g. B.Tech">
            </div>
            <div class="form-group">
                <label>Stream</label>
                <input type="text" id="reg-stream" placeholder="e.g. CSE">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="Min 6 characters">
                <span class="pwd-toggle" onclick="togglePwd('reg-password', this)">SHOW</span>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="reg-confirm" placeholder="Re-enter password">
                <span class="pwd-toggle" onclick="togglePwd('reg-confirm', this)">SHOW</span>
            </div>
            <button class="btn" id="register-btn" onclick="doRegister()">Create Account</button>
            <div id="reg-error" class="error"></div>
        </div>
    </div>

    <div id="captchaModal" class="modal">
        <div class="modal-content">
            <h4>Security Verification</h4>
            <p style="font-size: 12px; color: #666; margin-top: 5px;">Type the characters from the image below</p>
            <canvas id="captchaCanvas" width="200" height="70" onclick="generateCaptcha()"></canvas>
            <input type="text" id="captchaInput" class="captcha-input" autocomplete="off">
            <button class="btn" onclick="validateAndLogin()">Verify & Proceed</button>
            <p style="font-size: 11px; margin-top: 15px; color: var(--primary-blue); cursor: pointer;"
                onclick="generateCaptcha()">Refresh Image</p>
        </div>
    </div>

    <script>
        const isCapacitor = () => { return window.Capacitor?.Platform?.isNative || window.location.hostname === 'app.local'; }
        const BASE = "";
        let blockTimer = null;
        let loginBtn = document.getElementById('login-btn');

        function showTab(tab) {
            document.getElementById('login-view').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('register-view').style.display = tab === 'register' ? 'block' : 'none';
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
            document.getElementById('error').style.display = 'none';
            document.getElementById('reg-error').style.display = 'none';
        }

        function togglePwd(inputId, el) {
            const inp = document.getElementById(inputId);
            if (inp.type === 'password') {
                inp.type = 'text';
                el.textContent = 'HIDE';
            } else {
                inp.type = 'password';
                el.textContent = 'SHOW';
            }
        }

        async function doRegister() {
            const errDiv = document.getElementById('reg-error');
            errDiv.style.display = 'none';

            const name = document.getElementById('reg-name').value.trim();
            const user_id = document.getElementById('reg-userid').value.trim();
            const year = document.getElementById('reg-year').value;
            const degree = document.getElementById('reg-degree').value.trim();
            const stream = document.getElementById('reg-stream').value.trim();
            const password = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;

            if (!name || !user_id || !year || !degree || !password) {
                errDiv.textContent = "All required fields must be filled.";
                errDiv.style.display = 'block';
                return;
            }
            if (password !== confirm) {
                errDiv.textContent = "Passwords do not match.";
                errDiv.style.display = 'block';
                return;
            }
            if (password.length < 6) {
                errDiv.textContent = "Password must be at least 6 characters.";
                errDiv.style.display = 'block';
                return;
            }

            const btn = document.getElementById('register-btn');
            btn.disabled = true;
            btn.textContent = "Registering...";

            try {
                const res = await fetch(`${BASE}/student/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, user_id, year, degree, stream, password })
                });
                const data = await res.json();

                if (res.ok) {
                    errDiv.textContent = "Registration successful! You can now login.";
                    errDiv.className = 'error info';
                    errDiv.style.display = 'block';
                    document.getElementById('reg-name').value = '';
                    document.getElementById('reg-userid').value = '';
                    document.getElementById('reg-year').value = '';
                    document.getElementById('reg-degree').value = '';
                    document.getElementById('reg-stream').value = '';
                    document.getElementById('reg-password').value = '';
                    document.getElementById('reg-confirm').value = '';
                    setTimeout(() => showTab('login'), 2000);
                } else {
                    errDiv.textContent = data.error || "Registration failed.";
                    errDiv.style.display = 'block';
                }
            } catch (err) {
                errDiv.textContent = "Network error. Please check connection.";
                errDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = "Create Account";
            }
        }

        function startLoginFlow() {
            const user_id = document.getElementById('user_id').value.trim();
            const password = document.getElementById('password').value.trim();
            if (!user_id || !password) return alert("Fill all fields.");

            document.getElementById('captchaModal').style.display = 'flex';
            const capInput = document.getElementById('captchaInput');
            capInput.value = '';
            capInput.focus();
            generateCaptcha();
        }

        let _captchaAns = "";
        async function generateCaptcha() {
            try {
                const res = await fetch(`${BASE}/student/gen_captcha`);
                data = await res.json();
                _captchaAns = data.captcha_val;
                drawAdvancedCaptcha("captchaCanvas", _captchaAns);
            } catch (err) {
                alert(err);
                console.error("Captcha load failed", err);
            }
        }

        function drawAdvancedCaptcha(canvasId, code) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return "";
            const ctx = canvas.getContext('2d');

            const fonts = ["'Courier New'", "Arial", "Georgia", "Impact", "Tahoma"];

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#F8F9FA";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 15) {
                ctx.beginPath(); ctx.moveTo(x + (Math.random() * 4 - 2), 0); ctx.lineTo(x + (Math.random() * 4 - 2), canvas.height);
                ctx.strokeStyle = `rgba(0,0,0,${Math.random() * 0.05 + 0.02})`; ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += 15) {
                ctx.beginPath(); ctx.moveTo(0, y + (Math.random() * 4 - 2)); ctx.lineTo(canvas.width, y + (Math.random() * 4 - 2));
                ctx.strokeStyle = `rgba(0,0,0,${Math.random() * 0.05 + 0.02})`; ctx.stroke();
            }

            for (let i = 0; i < 20; i++) {
                ctx.beginPath();
                let x = Math.random() * canvas.width, y = Math.random() * canvas.height;
                ctx.moveTo(x, y); ctx.lineTo(x + Math.random() * 15 - 7, y + Math.random() * 15 - 7);
                ctx.strokeStyle = `rgba(0,0,0,${Math.random() * 0.3})`; ctx.lineWidth = Math.random() * 1.5 + 0.5; ctx.stroke();
            }

            const charCount = code.length;
            const stepX = canvas.width / (charCount + 1);

            for (let i = 0; i < charCount; i++) {
                const char = code.charAt(i);
                ctx.save();

                ctx.translate((i + 1) * stepX + (Math.random() * 10 - 5), canvas.height / 2 + (Math.random() * 8 - 4));
                ctx.rotate((Math.random() - 0.5) * 0.8);
                ctx.transform(1, 0, Math.random() * 0.4 - 0.2, 1, 0, 0);

                ctx.font = `${Math.floor(canvas.height * 0.5 + Math.random() * (canvas.height * 0.25))}px ${fonts[Math.floor(Math.random() * fonts.length)]}`;
                const r = Math.floor(Math.random() * 120), g = Math.floor(Math.random() * 120), b = Math.floor(Math.random() * 150 + 50);
                ctx.fillStyle = `rgb(${r},${g},${b})`;

                ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowOffsetX = 1.5; ctx.shadowOffsetY = 1.5; ctx.shadowBlur = 2;
                ctx.fillText(char, -ctx.measureText(char).width / 2, 0);
                ctx.shadowColor = 'transparent';

                if (Math.random() > 0.2) {
                    ctx.beginPath(); ctx.moveTo(-15, (Math.random() - 0.5) * 15); ctx.lineTo(15, (Math.random() - 0.5) * 15);
                    ctx.strokeStyle = `rgba(${r},${g},${b},${Math.random() * 0.9 + 0.3})`; ctx.lineWidth = Math.random() * 2 + 1; ctx.stroke();
                }
                ctx.restore();
            }

            for (let i = 0; i < 15; i++) {
                const x = Math.random() * canvas.width, y = Math.random() * canvas.height;
                const r = Math.floor(Math.random() * 200),
                      g = Math.floor(Math.random() * 200),
                      b = Math.floor(Math.random() * 200);
                ctx.fillStyle = `rgba(${r},${g},${b},${Math.random() * 0.5 + 0.3})`;
                ctx.beginPath(); ctx.arc(x, y, Math.random()*3, 0, 2*Math.PI); ctx.fill();
                if (Math.random() > 0.75)
                    for (let j = 0; j < 4; j++)
                        ctx.beginPath(); ctx.arc(x + Math.random()*6 - 3, y + Math.random()*6 - 3, Math.random()*3, 0, 2*Math.PI); ctx.fill();
            }
            return code;
        }

        async function validateAndLogin() {
            const input = document.getElementById('captchaInput').value;
            if (!input) return alert("Please enter the security code.");
            if (input !== _captchaAns) {
                generateCaptcha();
                document.getElementById('captchaInput').value = '';
                return alert("Wrong code. Try again.");
            }
            _captchaAns = "";
            document.getElementById('captchaModal').style.display = 'none';
            document.getElementById('login-form').submit();
        }


        function disableLoginButton(waitSeconds) {
            const btn = document.getElementById('login-btn');
            const errorDiv = document.getElementById('error');

            if (blockTimer) clearInterval(blockTimer);

            btn.disabled = true;
            let remaining = waitSeconds;

            blockTimer = setInterval(() => {
                remaining--;

                if (remaining <= 0) {
                    clearInterval(blockTimer);
                    blockTimer = null;
                    btn.disabled = false;
                    errorDiv.innerHTML = 'You can try logging in now.';
                    errorDiv.style.background = '#e8f5e9';
                    errorDiv.style.color = '#2e7d32';
                } else {
                    const minutes = Math.ceil(remaining / 60);
                    errorDiv.innerHTML = `⏰ Too many failed attempts.<br>Please try again after <strong>${minutes} minute${minutes !== 1 ? 's' : ''}</strong>.`;
                }
            }, 1000);
        }

        window.addEventListener('beforeunload', () => { if (blockTimer) clearInterval(blockTimer); });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const btn = document.getElementById('login-btn');
                if (!btn.disabled) {
                    if (document.getElementById('captchaModal').style.display === 'flex') validateAndLogin();
                    else startLoginFlow();
                }
            }
        });
    </script>
</body>

</html>
