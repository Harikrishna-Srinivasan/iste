<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Candidate Login | ISTE Performance Portal</title>
    <style>
        :root {
            --primary-blue: #1976D2;
            --thick-orange: #EF6C00;
            --thick-yellow: #FDD835;
            --bg-body: #F4F6F8;
            --bg-card: #FFFFFF;
            --text-main: #202124;
            --border: #DADCE0;
            --overlay: rgba(0, 0, 0, 0.5);
        }
        html, body {
            max-width: 100vw;
            overflow-x: hidden;
            box-sizing: border-box;
        }
        *, *:before, *:after {
            box-sizing: inherit;
        }
        .card, .container, .sidebar {
            width: 100%;
            max-width: 100%;
            overflow-wrap: break-word;
            word-wrap: break-word;
        }
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .app-bar {
            background: var(--primary-blue);
            color: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            border-bottom: 5px solid var(--thick-yellow);
        }

        .login-card {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-top: 8px solid var(--primary-blue);
            border: 1px solid var(--border);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 14px;
            color: #555;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fff;
            color: var(--text-main);
            font-size: 16px;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: var(--primary-blue);
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
            margin-top: 10px;
        }

        .btn:hover {
            filter: brightness(1.1);
            transform: scale(1.01);
        }

        /* Captcha Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 340px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        #captchaCanvas {
            background: #f0f0f0;
            border-radius: 6px;
            margin: 15px 0;
            cursor: pointer;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .captcha-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: center;
            font-size: 20px;
            letter-spacing: 4px;
            font-weight: bold;
        }

        .btn:disabled {
            background: #9E9E9E !important;
            cursor: not-allowed !important;
            opacity: 0.5 !important;
            transform: none !important;
            filter: none !important;
        }
        .btn:disabled:hover {
            filter: none !important;
            transform: none !important;
        }
        .error {
            color: #d32f2f;
            font-size: 13px;
            text-align: center;
            margin-top: 15px;
            display: none;
            padding: 10px;
            background: #ffebee;
            border-radius: 4px;
        }
        .error.info {
            background: #fff3e0;
            color: #e65100;
        }
    </style>
</head>

<body>
    <header class="app-bar">
        <h2>ISTE Performance Portal</h2>
    </header>

    <div class="login-card">
        <h3 style="text-align: center; margin-bottom: 30px; font-size: 24px; color: var(--primary-blue);">Student Login</h3>
        <div class="form-group">
            <label>Registration ID</label>
            <input type="text" id="user_id" placeholder="Enter the register no">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter the password">
        </div>
        <button class="btn" id="login-btn" onclick="startLoginFlow()">Authenticate & Login</button>
        <div id="error" class="error"></div>
    </div>

    <div id="captchaModal" class="modal">
        <div class="modal-content">
            <h4>Security Verification</h4>
            <p style="font-size: 12px; color: #666; margin-top: 5px;">Type the characters from the image below</p>
            <canvas id="captchaCanvas" width="200" height="70" onclick="generateCaptcha()"></canvas>
            <input type="text" id="captchaInput" class="captcha-input" autocomplete="off">
            <button class="btn" onclick="validateAndLogin()">Verify & Proceed</button>
            <p style="font-size: 11px; margin-top: 15px; color: var(--primary-blue); cursor: pointer;"
                onclick="generateCaptcha()">Refresh Image</p>
        </div>
    </div>

    <script>
        let correctCaptcha = "";
        let blockTimer = null;
        let loginBtn = document.getElementById('login-btn');

        function startLoginFlow() {
            const user_id = document.getElementById('user_id').value.trim();
            const password = document.getElementById('password').value.trim();
            if (!user_id || !password) return alert("Fill all fields.");

            document.getElementById('captchaModal').style.display = 'flex';
            const capInput = document.getElementById('captchaInput');
            capInput.value = '';
            capInput.focus();
            generateCaptcha();
        }

        function generateCaptcha() { correctCaptcha = drawAdvancedCaptcha("captchaCanvas"); }

        function drawAdvancedCaptcha(canvasId) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return "";
            const ctx = canvas.getContext('2d');

            const chars = "ABCDEFGHJKLMNPRSTUVWXYZ23456789";
            const fonts = ["'Courier New'", "Arial", "Georgia", "Impact", "Tahoma"];
            let code = "";

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#F8F9FA";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 15) {
                ctx.beginPath(); ctx.moveTo(x + (Math.random() * 4 - 2), 0); ctx.lineTo(x + (Math.random() * 4 - 2), canvas.height);
                ctx.strokeStyle = `rgba(0,0,0,${Math.random() * 0.05 + 0.02})`; ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += 15) {
                ctx.beginPath(); ctx.moveTo(0, y + (Math.random() * 4 - 2)); ctx.lineTo(canvas.width, y + (Math.random() * 4 - 2));
                ctx.strokeStyle = `rgba(0,0,0,${Math.random() * 0.05 + 0.02})`; ctx.stroke();
            }

            for (let i = 0; i < 20; i++) {
                ctx.beginPath();
                let x = Math.random() * canvas.width, y = Math.random() * canvas.height;
                ctx.moveTo(x, y); ctx.lineTo(x + Math.random() * 15 - 7, y + Math.random() * 15 - 7);
                ctx.strokeStyle = `rgba(0,0,0,${Math.random() * 0.3})`; ctx.lineWidth = Math.random() * 1.5 + 0.5; ctx.stroke();
            }

            ctx.textBaseline = 'middle';
            const charCount = 5;
            const stepX = canvas.width / (charCount + 1);

            for (let i = 0; i < charCount; i++) {
                const char = chars.charAt(Math.floor(Math.random() * chars.length));
                code += char;
                ctx.save();

                ctx.translate((i + 1) * stepX + (Math.random() * 10 - 5), canvas.height / 2 + (Math.random() * 8 - 4));
                ctx.rotate((Math.random() - 0.5) * 0.8);
                ctx.transform(1, 0, Math.random() * 0.4 - 0.2, 1, 0, 0);

                ctx.font = `${Math.floor(canvas.height * 0.5 + Math.random() * (canvas.height * 0.25))}px ${fonts[Math.floor(Math.random() * fonts.length)]}`;
                const r = Math.floor(Math.random() * 120), g = Math.floor(Math.random() * 120), b = Math.floor(Math.random() * 150 + 50);
                ctx.fillStyle = `rgb(${r},${g},${b})`;

                ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowOffsetX = 1.5; ctx.shadowOffsetY = 1.5; ctx.shadowBlur = 2;
                ctx.fillText(char, -ctx.measureText(char).width / 2, 0);
                ctx.shadowColor = 'transparent';

                if (Math.random() > 0.2) {
                    ctx.beginPath(); ctx.moveTo(-15, (Math.random() - 0.5) * 15); ctx.lineTo(15, (Math.random() - 0.5) * 15);
                    ctx.strokeStyle = `rgba(${r},${g},${b},${Math.random() * 0.6 + 0.3})`; ctx.lineWidth = Math.random() * 2 + 1; ctx.stroke();
                }
                ctx.restore();
            }

            for (let i = 0; i < 90; i++) {
                const x = Math.random() * canvas.width, y = Math.random() * canvas.height;
                ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.35})`;
                ctx.beginPath(); ctx.arc(x, y, Math.random() * 2.2, 0, 2 * Math.PI); ctx.fill();
                if (Math.random() > 0.75) {
                    for (let j = 0; j < 3; j++) {
                        ctx.beginPath(); ctx.arc(x + Math.random() * 6 - 3, y + Math.random() * 6 - 3, Math.random() * 1.2, 0, 2 * Math.PI); ctx.fill();
                    }
                }
            }
            return code;
        }

        async function validateAndLogin() {
            const input = document.getElementById('captchaInput').value.toUpperCase();
            if (input !== correctCaptcha) {
                alert("Security Code Mismatch.");
                generateCaptcha();
                document.getElementById('captchaInput').value = "";
                return;
            }

            document.getElementById('captchaModal').style.display = 'none';
            await login();
        }

        async function login() {
            const user_id = document.getElementById('user_id').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('error');

            errorDiv.style.display = 'none';
            errorDiv.className = 'error';
            
            try {
                const res = await fetch("/student/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user_id, password })
                });

                const data = await res.json();

                if (res.ok)
                    window.location.href = "/dashboard";
                else {
                    if (res.status === 429 && data.blocked) {
                        const waitMinutes = Math.ceil(data.wait_seconds / 60);
                        errorDiv.innerHTML = `⏰ Too many failed attempts.<br>Please try again after <strong>${waitMinutes} minute${waitMinutes !== 1 ? 's' : ''}</strong>.`;
                        errorDiv.className = 'error info';
                        errorDiv.style.display = 'block';
                        
                        disableLoginButton(data.wait_seconds);
                    } else {
                        errorDiv.textContent = data.error || 'Invalid Credentials. Access Denied.';
                        errorDiv.style.display = 'block';
                    }
                }
            } catch (err) {
                errorDiv.textContent = 'Network error. Please check your connection.';
                errorDiv.style.display = 'block';
            }
        }

        function disableLoginButton(waitSeconds) {
            const btn = document.getElementById('login-btn');
            const errorDiv = document.getElementById('error');
            
            if (blockTimer) clearInterval(blockTimer);
            
            btn.disabled = true;            
            let remaining = waitSeconds;
            
            blockTimer = setInterval(() => {
                remaining--;
                
                if (remaining <= 0) {
                    clearInterval(blockTimer);
                    blockTimer = null;
                    btn.disabled = false;
                    errorDiv.innerHTML = 'You can try logging in now.';
                    errorDiv.style.background = '#e8f5e9';
                    errorDiv.style.color = '#2e7d32';
                } else {
                    const minutes = Math.ceil(remaining / 60);
                    errorDiv.innerHTML = `⏰ Too many failed attempts.<br>Please try again after <strong>${minutes} minute${minutes !== 1 ? 's' : ''}</strong>.`;
                }
            }, 1000);
        }

        window.addEventListener('beforeunload', () => { if (blockTimer) clearInterval(blockTimer); });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const btn = document.getElementById('login-btn');
                if (!btn.disabled) {
                    if (document.getElementById('captchaModal').style.display === 'flex') validateAndLogin();
                    else startLoginFlow();
                }
            }
        });
    </script>
</body>

</html>
