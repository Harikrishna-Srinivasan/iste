<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Administration Dashboard for assessments and student performance.">
    <title>Administration Dashboard</title>
    <link rel="icon" type="image/png" href="/iste.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --admin: #5e35b1;
            --admin-dark: #4527a0;
            --bg: #fafafa;
            --card: #ffffff;
            --text: #1d1d1f;
            --muted: #86868b;
            --border: #c0c0c0;
            --green: #30a046;
            --red: #ff453a;
            --blue: #0071e3;
            --orange: #ff9f0a;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            --shadow-hover: 0 8px 30px rgba(0, 0, 0, 0.08);
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; overflow-x: hidden; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
        body { padding-bottom: 36px; }
        .nav {
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 24px; background: rgba(255, 255, 255, 0.95); backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--border); box-shadow: var(--shadow);
        }
        .nav-left { display: flex; align-items: center; gap: 14px; min-width: 0; flex: 1; }
        .nav-logo-lg { width: 60px; height: 50px; object-fit: contain; flex: 0 0 auto; }
        .nav-brand-text { display: flex; flex-direction: column; gap: 0; min-width: 0; }
        .nav-brand-title { font-weight: 700; font-size: 14px; color: var(--text); letter-spacing: -0.01em; line-height: 1.2; white-space: nowrap; }
        .nav-brand-sub { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; line-height: 1.3; white-space: nowrap; }
        .nav-right { display: flex; align-items: center; gap: 22px; flex: 0 0 auto; }
        .nav-logo-sm { width: 40px; height: 40px; object-fit: contain; flex: 0 0 auto; }
        .nav-portal-label { font-weight: 700; font-size: 16px; color: var(--admin); letter-spacing: -0.01em; white-space: nowrap; }
        .logout-btn { border: none; border-radius: 8px; padding: 8px 18px; background: var(--text); color: #fff; font-weight: 600; font-size: 13px; cursor: pointer; transition: background 0.2s, transform 0.1s; }
        .logout-btn:hover { background: #3a3a3c; }
        .logout-btn:active { transform: scale(0.98); }
        @media (max-width: 720px) {
            .nav { flex-direction: column; gap: 8px; align-items: stretch; }
            .nav-left { flex: none; justify-content: center; }
            .nav-right { flex: none; justify-content: center; gap: 14px; }
            .nav-brand-title { font-size: 12px; }
            .nav-brand-sub { font-size: 9px; }
            .nav-portal-label { font-size: 14px; }
        }
        main { max-width: 1400px; margin: 24px auto 0; padding: 0 16px; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow); padding: 24px; overflow: hidden; }
        .card.full { grid-column: 1 / -1; }
        h3 { margin: 0 0 14px; font-size: 18px; color: var(--admin); }
        p { margin: 0 0 12px; color: var(--muted); }
        label { margin: 0 0 8px; font-size: 13px; font-weight: 700; color: #344054; }
        input:not([type="checkbox"]):not([type="radio"]), select, textarea {
            width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; background: #fff; color: var(--text); font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:not([type="checkbox"]):not([type="radio"]):focus, select:focus, textarea:focus {
            outline: none; border-color: var(--admin); box-shadow: 0 0 0 3px rgba(94, 53, 177, 0.15);
        }
        textarea { min-height: 92px; resize: vertical; }
        input[type="file"] { padding: 8px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
        .controls { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
        .btn { border: none; border-radius: 12px; padding: 14px 20px; font-weight: 600; font-size: 14px; cursor: pointer; color: #fff; background: var(--admin); transition: transform 0.1s, box-shadow 0.2s; }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(94, 53, 177, 0.3); }
        .btn:active { transform: translateY(0); }
        .btn.secondary { background: var(--blue); }
        .btn.secondary:hover { box-shadow: 0 4px 12px rgba(0, 113, 227, 0.3); }
        .btn.green { background: var(--green); }
        .btn.green:hover { box-shadow: 0 4px 12px rgba(48, 160, 70, 0.3); }
        .btn.orange { background: var(--orange); }
        .btn.orange:hover { box-shadow: 0 4px 12px rgba(255, 159, 10, 0.3); }
        .btn.red { background: var(--red); }
        .btn.red:hover { box-shadow: 0 4px 12px rgba(255, 69, 58, 0.3); }
        .btn.outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
        .btn.outline:hover { background: #f5f5f7; }
        .btn.small { padding: 10px 14px; font-size: 13px; border-radius: 10px; }
        .status-msg { margin-top: 12px; padding: 12px 14px; border-radius: 12px; display: none; font-size: 13px; font-weight: 600; }
        .status-success { display: block; background: #e8f5e9; color: var(--green); border: 1px solid #c8e6c9; }
        .status-error { display: block; background: #ffebee; color: var(--red); border: 1px solid #ffcdd2; }
        .status-info { display: block; background: #e3f2fd; color: var(--blue); border: 1px solid #bbdefb; }
        .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 14px; }
        table { width: 100%; border-collapse: collapse; min-width: 720px; background: #fff; }
        thead th { background: #f2f5fb; color: #344054; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; text-align: left; padding: 12px 14px; border-bottom: 1px solid var(--border); }
        tbody td { padding: 12px 14px; border-bottom: 1px solid #edf0f5; vertical-align: top; }
        tbody tr.row-hover { cursor: pointer; }
        tbody tr.row-hover:hover { background: #fafcff; }
        .muted { color: var(--muted); }
        .badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
        .badge.green { background: #e8f5e9; color: var(--green); }
        .badge.orange { background: #fff3e0; color: var(--orange); }
        .badge.blue { background: #e3f2fd; color: var(--blue); }
        .badge.gray { background: #f2f4f7; color: #475467; }
        .detail-row td { background: #fbfcfe; }
        .detail-card { border: 1px solid var(--border); border-radius: 14px; padding: 14px; background: #fff; }
        .split { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .analysis-list { display: grid; gap: 10px; margin-top: 12px; }
        .analysis-item { border: 1px solid var(--border); border-radius: 14px; padding: 12px; background: #fff; }
        .analysis-item.good { border-left: 5px solid var(--green); }
        .analysis-item.bad { border-left: 5px solid var(--red); }
        .analysis-item.neutral { border-left: 5px solid #9e9e9e; }
        .analysis-head { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; align-items: center; }
        .analysis-q { margin-top: 8px; color: #344054; }
        .answers { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-top: 10px; }
        .answers div { background: #f8fafc; border: 1px solid #edf0f5; border-radius: 12px; padding: 10px; }
        .hidden { display: none !important; }
        .small { font-size: 12px; }
        .q-list { display: flex; flex-direction: column; gap: 14px; margin-top: 10px; }
        .question-card { background: #f8fafc; border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
        .q-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .q-text { width: 100%; min-height: 52px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 13px; background: #fff; resize: vertical; }
        .q-text:focus { outline: none; border-color: var(--admin); box-shadow: 0 0 0 3px rgba(94, 53, 177, 0.15); }
        .q-text:disabled { background: #f2f4f7; color: #475467; }
        .q-opts-wrap { margin-top: 8px; }
        .q-opts-label { font-size: 12px; font-weight: 700; color: #344054; display: block; margin-bottom: 4px; }
        .opt-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .opt-row input[type="radio"], .opt-row input[type="checkbox"] { width: auto; margin: 0; }
        .opt-row input[type="text"] { flex: 1; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; background: #fff; }
        .opt-row input[type="text"]:focus { outline: none; border-color: var(--admin); box-shadow: 0 0 0 3px rgba(94, 53, 177, 0.15); }
        .opt-row input[type="text"]:disabled { background: #f2f4f7; color: #475467; }
        .opt-row label { margin: 0; font-size: 12px; }
        .q-num-val, .q-num-from, .q-num-to { width: 120px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; background: #fff; }
        .q-num-val:focus, .q-num-from:focus, .q-num-to:focus { outline: none; border-color: var(--admin); box-shadow: 0 0 0 3px rgba(94, 53, 177, 0.15); }
        .q-num-val:disabled, .q-num-from:disabled, .q-num-to:disabled { background: #f2f4f7; color: #475467; }
        .q-marks { display: flex; gap: 16px; margin-top: 10px; }
        .q-marks label { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; color: #344054; margin: 0; }
        .q-marks input[type="number"] { width: 80px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; background: #fff; }
        .q-marks input[type="number"]:focus { outline: none; border-color: var(--admin); box-shadow: 0 0 0 3px rgba(94, 53, 177, 0.15); }
        .q-marks input[type="number"]:disabled { background: #f2f4f7; color: #475467; }
        .q-list-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 10px; }
        .q-list-2col .question-card { margin: 0; }
        .qa-grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .date-wrap { position: relative; display: flex; align-items: center; cursor: pointer; }
        .date-wrap input[type="text"] { width: 100%; padding-right: 40px; cursor: pointer; }
        .date-wrap input[type="date"] { position: fixed; left: -9999px; top: 0; opacity: 0; width: 1px; height: 1px; pointer-events: none; color-scheme: dark; }
        .date-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); pointer-events: none; font-size: 16px; line-height: 1; }
        .rank-emoji { font-size: 18px; line-height: 1; display: inline-block; }
        .rank-cell { display: flex; align-items: center; gap: 6px; }
        .ass-head { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; cursor: pointer; }
        .ass-counts { display: flex; align-items: center; gap: 8px; }
        .ass-counts .badge { font-size: 12px; padding: 4px 10px; cursor: pointer; transition: transform 0.1s; }
        .ass-counts .badge:hover { transform: scale(1.05); }
        @media (max-width: 720px) { .q-list-2col { grid-template-columns: 1fr; } .qa-grid-2col { grid-template-columns: 1fr; } }
        @media (max-width: 1100px) { main { grid-template-columns: 1fr; } .card.full { grid-column: auto; } }
        @media (max-width: 720px) { .grid-2, .grid-3, .answers { grid-template-columns: 1fr; } table { min-width: 620px; } }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-left">
            <img src="/sastra.png" class="nav-logo-lg">
            <div class="nav-brand-text">
                <div class="nav-brand-title">SASTRA DEEMED TO BE UNIVERSITY</div>
                <div class="nav-brand-sub">Srinivasa Ramanujan Centre, Kumbakonam</div>
            </div>
        </div>
        <div class="nav-right">
            <img src="/iste.png" class="nav-logo-sm">
            <span class="nav-portal-label">ISTE ADMIN PORTAL</span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <main>
        <section class="card">
            <h3>Post Assessment</h3>
            <label>Import Questions (Excel)</label>
            <div style="display: flex; gap: 14px; align-items: center; flex-wrap: wrap; margin-bottom: 12px;">
                <input type="file" id="excel-file" accept=".xlsx,.xls,.csv" style="flex: 1;">
                <button class="btn orange" onclick="uploadQuestions()">Import Questions</button>
                <div id="upload-status" class="status-msg"></div>
            </div>

            <div class="grid-3" style="margin-bottom:4px;">
                <div>
                    <label for="ass_type">Assessment Type</label>
                    <select id="ass_type">
                        <option value="WEEK" selected>Weekly Test</option>
                        <option value="DAY">Daily Practice</option>
                        <option value="MOCK">Mock Exam</option>
                    </select>
                </div>
                <div>
                    <label for="series_no">Series No.</label>
                    <input type="number" id="series_no" min="1" placeholder="e.g. 5">
                </div>
                <div>
                    <label for="total_duration">Total Duration (mins)</label>
                    <input type="number" id="total_duration" min="1" value="60">
                </div>
            </div>
            <div style="margin-top:12px;"><label for="test-title">Title</label></div>
            <input type="text" id="test-title" placeholder="e.g. Logical Reasoning">
            <div class="grid-2" style="margin-top:12px;">
                <div>
                    <label for="start_date_hidden">Start Date</label>
                    <div class="date-wrap" onclick="showDatePicker('start_date_hidden')">
                        <input type="text" id="start_date" placeholder="dd-month-yyyy" maxlength="15" autocomplete="off" readonly>
                        <input type="date" id="start_date_hidden" onchange="syncDateDisplay('start_date', this.value)">
                    </div>
                </div>
                <div>
                    <label for="start_time">Start Time</label>
                    <input type="time" id="start_time" step="300">
                </div>
            </div>
            <div class="grid-2">
                <div>
                    <label for="end_date_hidden">Entry Close Date</label>
                    <div class="date-wrap" onclick="showDatePicker('end_date_hidden')">
                        <input type="text" id="end_date" placeholder="dd-Month-yyyy" maxlength="15" autocomplete="off" readonly>
                        <input type="date" id="end_date_hidden" onchange="syncDateDisplay('end_date', this.value)">
                    </div>
                </div>
                <div>
                    <label for="end_time">Entry Close Time</label>
                    <input type="time" id="end_time" step="300">
                </div>
            </div>
            <label>Reminder Intervals</label>
            <div class="controls" style="margin-bottom: 12px;">
                <label style="font-weight: normal;"><input type="checkbox" name="rem" value="1d"> 1 Day</label>
                <label style="font-weight: normal;"><input type="checkbox" name="rem" value="2h"> 2 Hrs</label>
                <label style="font-weight: normal;"><input type="checkbox" name="rem" value="1h"> 1 Hr</label>
                <label style="font-weight: normal;"><input type="checkbox" name="rem" value="15m"> 15 Min</label>
                <label style="font-weight: normal;"><input type="checkbox" name="rem" value="5m"> 5 Min</label>
            </div>
            <div class="controls">
                <button class="btn green" onclick="scheduleEvent()">Publish Assessment</button>
            </div>
            <div id="publish-status" class="status-msg" aria-live="polite"></div>
        </section>

        <section class="card">
            <h3>Send Message to Students</h3>
            <div><label for="msg-title">Notification Title</label></div>
            <input type="text" id="msg-title" placeholder="e.g. Important Announcement">
            <div style="margin-top:12px;"><label for="msg-body">Message Body</label></div>
            <textarea id="msg-body" placeholder="Type the message here"></textarea>
            <div style="margin-top:12px;"><label for="msg-date-hidden">Schedule Date (optional)</label></div>
            <div class="grid-2" style="gap: 10px;">
                <div class="date-wrap" onclick="showDatePicker('msg-date-hidden')">
                    <input type="text" id="msg-date" placeholder="dd-Month-yyyy" readonly>
                    <input type="date" id="msg-date-hidden" onchange="syncDateDisplay('msg-date', this.value)">
                </div>
                <input type="time" id="msg-time" step="300">
            </div>
            <div class="controls" style="margin-top:12px;">
                <button class="btn secondary" onclick="scheduleMessage()">Schedule Message</button>
            </div>
            <div id="msg-status" class="status-msg"></div>
        </section>

        <section class="card full">
            <h3>All Registered Students</h3>
            <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:12px;">
                <input type="text" id="search-reg" placeholder="Search by Reg No." oninput="filterStudents()" style="max-width:200px;">
                <button class="btn orange" onclick="loadStudents()">Load Student List</button>
                <button class="btn green" id="download-students-btn" onclick="downloadStudentsXLSX()" style="display:none;">Download XLSX</button>
                <div id="students-status" class="status-msg" style="margin:0;"></div>
            </div>
            <div class="table-wrap" id="students-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Reg. No</th><th>Name</th><th>Year</th><th>Degree</th><th>Stream</th>
                        </tr>
                    </thead>
                    <tbody id="students-table-body">
                        <tr><td colspan="5" class="muted" style="text-align:center; padding: 20px;">Click "Load Student List" to view all registered students.</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section class="card full">
            <h3>Published Assessments</h3>
            <div id="assessments-status" class="status-msg"></div>
            <div id="assessments-container" class="analysis-list">
                <div class="muted" style="text-align:center; padding: 18px;">Loading assessments...</div>
            </div>
        </section>
    </main>
    <script>
        let studentsData = [];
        let studentAttemptsCache = new Map();
        let assessmentCache = new Map();

        function escapeHtml(value) {
            return String(value ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function filterStudents() {
            const q = document.getElementById('search-reg').value.trim().toLowerCase();
            const rows = document.querySelectorAll('#students-table-body tr[data-student-row]');
            rows.forEach(row => {
                const reg = row.querySelector('td:first-child')?.textContent?.toLowerCase() || '';
                row.style.display = !q || reg.includes(q) ? '' : 'none';
                const detail = document.getElementById(`student-detail-row-${row.dataset.studentRow}`);
                if (detail) detail.style.display = row.style.display === 'none' ? 'none' : '';
            });
        }

        function showStatus(el, message, type) {
            if (!el) return;
            el.className = `status-msg status-${type}`;
            el.textContent = message;
            setTimeout(() => { el.className = 'status-msg'; el.textContent = ''; }, 5000);
        }

        function clearStatus(el) {
            if (!el) return;
            el.className = 'status-msg';
            el.textContent = '';
        }

        let uploadedQuestionIds = [];

        const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

        function fmtDateStr(s) {
            if (!s) return '';
            const d = new Date(s);
            if (isNaN(d.getTime())) return '';
            return `${String(d.getDate()).padStart(2,'0')}-${MONTHS[d.getMonth()]}-${d.getFullYear()}`;
        }
        function fmtTimeStr(s) {
            if (!s) return '';
            const d = new Date(s);
            if (isNaN(d.getTime())) return '';
            const h = d.getHours(), m = String(d.getMinutes()).padStart(2, '0');
            const ampm = h >= 12 ? 'PM' : 'AM';
            const h12 = h % 12 || 12;
            return `${h12}:${m} ${ampm}`;
        }

        function showDatePicker(hiddenId) {
            const el = document.getElementById(hiddenId);
            if (el?.showPicker) el.showPicker();
            else if (el) { el.style.position = 'fixed'; el.style.left = '0'; el.style.top = '0'; el.style.width = '100%'; el.style.height = '100%'; el.style.opacity = '0.01'; el.style.pointerEvents = 'auto'; el.focus(); setTimeout(() => { el.style.position = 'fixed'; el.style.left = '-9999px'; el.style.width = '1px'; el.style.height = '1px'; el.style.opacity = '0'; el.style.pointerEvents = 'none'; }, 200); }
        }

        function syncDateDisplay(textId, isoValue) {
            if (!isoValue) return;
            const parts = isoValue.split('-');
            if (parts.length === 3) {
                const m = parseInt(parts[1], 10);
                document.getElementById(textId).value = `${parts[2]}-${MONTHS[m - 1]}-${parts[0]}`;
            }
        }

        function toISODate(ddmmyyyy) {
            if (!ddmmyyyy) return '';
            const m = ddmmyyyy.match(/^(\d{1,2})-([A-Z][a-z]+)-(\d{4})$/);
            if (m) {
                const idx = MONTHS.indexOf(m[2]);
                if (idx !== -1) {
                    const dd = String(m[1]).padStart(2, '0');
                    const mm = String(idx + 1).padStart(2, '0');
                    return `${m[3]}-${mm}-${dd}`;
                }
            }
            return '';
        }

        function combineDateTime(dateId, timeId) {
            const date = document.getElementById(dateId).value;
            const time = document.getElementById(timeId).value;
            if (!date || !time) return '';
            const iso = toISODate(date);
            if (!iso) return '';
            return `${iso}T${time}`;
        }

        function yearRoman(year) {
            return {1:'I', 2:'II', 3:'III', 4:'IV'}[year] || year || '-';
        }

        function formatMinutes(sec) {
            sec = Math.max(0, Math.round(Number(sec) || 0));
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            return `${m}m ${s}s`;
        }

        function rankEmoji(rank, pct) {
            if (pct === 100) return '👑 💯';
            if (rank === 1) return '👑';
            if (rank === 2) return '⭐';
            if (rank === 3) return '🥉';
            if (rank === 4) return '📈';
            if (rank === 5) return '💡';
            return `#${rank}`;
        }

        function formatLocal(dt) {
            if (!dt) return '-';
            const d = new Date(dt);
            return d.toLocaleString([], { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function resultsTime(endAt, duration) {
            if (!endAt) return '-';
            const d = new Date(new Date(endAt).getTime() + (duration || 0) * 60000);
            return d.toLocaleString([], { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function formatAssessmentName(a) {
            const type = a.type || 'Assessment';
            return a.series_no ? `${type} ${a.series_no}: ${a.title}` : `${type}: ${a.title}`;
        }

        function prefillStart() {
            const today = new Date();
            const dd = String(today.getDate()).padStart(2, '0');
            const monthName = MONTHS[today.getMonth()];
            const yyyy = today.getFullYear();
            const todayStr = `${dd}-${monthName}-${yyyy}`;

            document.getElementById('start_date').value = todayStr;
            document.getElementById('start_time').value = '20:00';
            document.getElementById('end_date').value = todayStr;
            document.getElementById('end_time').value = '20:05';
        }

        async function uploadQuestions() {
            const statusEl = document.getElementById('upload-status');
            const file = document.getElementById('excel-file').files[0];
            if (!file) return showStatus(statusEl, 'Select a file first.', 'error');

            const formData = new FormData();
            formData.append('file', file);
            showStatus(statusEl, 'Importing questions...', 'info');

            try {
                const res = await fetch('/admin/upload_excel', { method: 'POST', body: formData });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Import failed');
                uploadedQuestionIds = data.ids || [];
                document.getElementById('total_duration').value = uploadedQuestionIds.length || 30;
                showStatus(statusEl, `Imported ${uploadedQuestionIds.length} questions. Duration set to ${uploadedQuestionIds.length} min.`, 'success');
            } catch (err) {
                showStatus(statusEl, err.message || 'Network error.', 'error');
            }
        }

        function scheduleEvent() {
            const statusEl = document.getElementById('publish-status');
            const title = document.getElementById('test-title').value.trim();
            const startAt = combineDateTime('start_date', 'start_time');
            const endAt = combineDateTime('end_date', 'end_time');
            const seriesNo = document.getElementById('series_no').value.trim();

            if (!title) return showStatus(statusEl, 'Title is required.', 'error');
            if (!startAt) return showStatus(statusEl, 'Start date and time are required.', 'error');
            if (!uploadedQuestionIds.length) return showStatus(statusEl, 'Import questions first.', 'error');
            if (endAt && endAt <= startAt) return showStatus(statusEl, 'Entry close time must be after start time.', 'error');

            const reminders = Array.from(document.querySelectorAll('input[name="rem"]:checked')).map(cb => cb.value);
            showStatus(statusEl, 'Publishing assessment...', 'info');

            fetch('/admin/create_assessment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    title,
                    type: document.getElementById('ass_type').value,
                    series_no: seriesNo ? parseInt(seriesNo, 10) : null,
                    duration: parseInt(document.getElementById('total_duration').value, 10) || uploadedQuestionIds.length,
                    start_at: startAt,
                    end_at: endAt || null,
                    question_ids: uploadedQuestionIds,
                    reminders
                })
            })
            .then(async res => ({ res, data: await res.json() }))
            .then(({ res, data }) => {
                if (!res.ok) throw new Error(data.error || 'Failed to publish');
                showStatus(statusEl, 'Assessment published successfully.', 'success');
                document.getElementById('test-title').value = '';
                document.getElementById('series_no').value = '';
                document.getElementById('excel-file').value = '';
                prefillStart();
                uploadedQuestionIds = [];
                document.getElementById('total_duration').value = '30';
                fetchAssessmentsList();
            })
            .catch(err => showStatus(statusEl, err.message || 'Network error.', 'error'));
        }

        function drawCaptcha(canvasId, code) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#F8F9FA';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = 'bold 28px monospace';
            ctx.fillStyle = '#5e35b1';
            ctx.fillText(code, 12, 36);
        }

        async function toggleAttemptQA(containerId, uid, aid) {
            const el = document.getElementById(containerId);
            if (!el) return;
            const hidden = el.classList.contains('hidden');
            if (!hidden) { el.classList.add('hidden'); return; }
            el.classList.remove('hidden');
            el.innerHTML = '<div class="muted">Loading question analysis...</div>';
            try {
                const res = await fetch(`/admin/attempt_details/${uid}/${aid}`);
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Failed');
                if (!data.length) { el.innerHTML = '<div class="muted">No details.</div>'; return; }
                el.innerHTML = '<div class="qa-grid-2col">' + data.map((q, idx) => {
                    const score = Number(q.score || 0);
                    const good = score > 0, bad = score < 0;
                    let sResp = q.student_response || {};
                    if (typeof sResp === 'string') try { sResp = JSON.parse(sResp); } catch { sResp = {}; }
                    let studentAns = 'Skipped', correctAns = '---';
                    if (q.type === 'MCQ' || q.type === 'MSQ') {
                        const opts = q.correct_answer?.options || [];
                        const sIds = sResp.selected_ids || (sResp.selected_id !== undefined ? [sResp.selected_id] : []);
                        const cIds = q.correct_answer.correct_ids || [q.correct_answer.correct_id];
                        if (sIds.length) studentAns = sIds.map(id => opts[id]).filter(Boolean).join(', ');
                        correctAns = cIds.map(id => opts[id]).filter(Boolean).join(', ');
                    } else {
                        if (sResp.value !== undefined && sResp.value !== '') studentAns = sResp.value;
                        correctAns = q.correct_answer?.value !== undefined ? q.correct_answer.value : (q.correct_answer?.range ? `${q.correct_answer.range[0]} to ${q.correct_answer.range[1]}` : 'N/A');
                    }
                    return `<div class="analysis-item ${good ? 'good' : bad ? 'bad' : 'neutral'}">
                        <div class="analysis-head">
                            <strong>Q${idx+1} (${escapeHtml(q.type)})</strong>
                            <div class="badge ${good ? 'green' : bad ? 'orange' : 'gray'}">${score > 0 ? '+' : ''}${escapeHtml(score)}</div>
                        </div>
                        <div class="analysis-q">${escapeHtml(q.question)}</div>
                        <div class="answers">
                            <div><span class="small muted">You</span><div>${escapeHtml(studentAns)}</div></div>
                            <div><span class="small muted">Correct</span><div>${escapeHtml(correctAns)}</div></div>
                        </div>
                    </div>`;
                }).join('') + '</div>';
            } catch (err) {
                el.innerHTML = `<div class="muted" style="color:var(--red);">${escapeHtml(err.message)}</div>`;
            }
        }

        function downloadStudentsXLSX() {
            if (!studentsData.length || typeof XLSX === 'undefined') return;
            const rows = studentsData.map(s => ({
                'Reg. No': s.user_id,
                'Name': s.name,
                'Year': yearRoman(s.year),
                'Degree': s.degree,
                'Stream': s.stream || ''
            }));
            const ws = XLSX.utils.json_to_sheet(rows);

        function renderEditPanel(a) {
            const editable = !!a.editable;
            const questions = a.questions || [];
            const qHtml = questions.map((q, idx) => {
                const ans = typeof q.answer === 'object' && q.answer !== null ? q.answer : {};
                const opts = ans.options || [];
                const correctId = ans.correct_id;
                const correctIds = ans.correct_ids || [];
                const val = ans.value;
                const rng = ans.range;

                let answerInput = '';
                if (q.type === 'MCQ') {
                    answerInput = opts.map((opt, oi) => `
                        <div class="opt-row">
                            <input type="radio" name="q-ans-${a.id}-${q.id}" value="${oi}" ${oi === correctId ? 'checked' : ''} ${editable ? '' : 'disabled'}>
                            <input type="text" class="q-opt" value="${escapeHtml(opt)}" data-qid="${q.id}" data-oidx="${oi}" ${editable ? '' : 'disabled'}>
                        </div>
                    `).join('');
                } else if (q.type === 'MSQ') {
                    answerInput = opts.map((opt, oi) => `
                        <div class="opt-row">
                            <input type="checkbox" value="${oi}" ${correctIds.includes(oi) ? 'checked' : ''} ${editable ? '' : 'disabled'}>
                            <input type="text" class="q-opt" value="${escapeHtml(opt)}" data-qid="${q.id}" data-oidx="${oi}" ${editable ? '' : 'disabled'}>
                        </div>
                    `).join('');
                } else if (q.type === 'INT' || q.type === 'NUM') {
                    if (rng && rng.length === 2) {
                        answerInput = `<div class="opt-row">
                            <label style="font-size:12px;">From</label>
                            <input type="number" class="q-num-from" value="${escapeHtml(rng[0])}" step="any" ${editable ? '' : 'disabled'}>
                            <label style="font-size:12px;">To</label>
                            <input type="number" class="q-num-to" value="${escapeHtml(rng[1])}" step="any" ${editable ? '' : 'disabled'}>
                        </div>`;
                    } else {
                        answerInput = `<input type="number" class="q-num-val" value="${escapeHtml(val ?? '')}" step="any" ${editable ? '' : 'disabled'}>`;
                    }
                }
                return `<div class="question-card">
                    <div class="q-head"><strong>Q${idx+1}</strong><span class="badge gray">${escapeHtml(q.type)}</span></div>
                    <textarea class="q-text" data-qid="${q.id}" ${editable ? '' : 'disabled'}>${escapeHtml(q.question)}</textarea>
                    ${opts.length ? `<div class="q-opts-wrap"><label class="q-opts-label">Options</label>${answerInput}</div>` : `<div class="q-opts-wrap">${answerInput}</div>`}
                    <div class="q-marks">
                        <label>Mark <input type="number" class="q-mark" value="${escapeHtml(q.mark ?? 1)}" step="any" ${editable ? '' : 'disabled'}></label>
                        <label>Neg Mark <input type="number" class="q-neg" value="${escapeHtml(q.negative_mark ?? 0)}" step="any" ${editable ? '' : 'disabled'}></label>
                    </div>
                </div>`;

            const s = a.start_at ? new Date(a.start_at) : null;
            const e = a.end_at ? new Date(a.end_at) : null;
            const fmtDate = d => d ? `${String(d.getDate()).padStart(2,'0')}-${MONTHS[d.getMonth()]}-${d.getFullYear()}` : '';
            const fmtTime24 = d => d ? `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}` : '';
            const fmtTimeAMPM = d => {
                if (!d) return '';
                const h = d.getHours(), m = String(d.getMinutes()).padStart(2, '0');
                return `${h % 12 || 12}:${m} ${h >= 12 ? 'PM' : 'AM'}`;
            };

            return `
                <div class="grid-2">
                    <div class="detail-card">
                        <div class="badge ${editable ? 'green' : 'orange'}">${editable ? 'Editable' : 'Locked'}</div>
                        <div class="grid-2" style="margin-top:12px;">
                            <div><label>Title <input id="ass-title-${a.id}" value="${escapeHtml(a.title || '')}" ${editable ? '' : 'disabled'}></label></div>
                            <div><label>Series No. <input id="ass-series-${a.id}" type="number" value="${escapeHtml(a.series_no || '')}" ${editable ? '' : 'disabled'}></label></div>
                            <div><label>Duration (mins) <input id="ass-duration-${a.id}" type="number" value="${escapeHtml(a.total_duration || 0)}" ${editable ? '' : 'disabled'}></label></div>
                        </div>
                        <div class="grid-2" style="margin-top:12px;">
                            <div><label for="ass-start-date-hidden-${a.id}">Start Date</label><div class="date-wrap" onclick="showDatePicker('ass-start-date-hidden-${a.id}')">
                                <input type="text" id="ass-start-date-${a.id}" placeholder="dd-Month-yyyy" maxlength="15" readonly value="${fmtDate(s)}">
                                <input type="date" id="ass-start-date-hidden-${a.id}" onchange="syncDateDisplay('ass-start-date-${a.id}', this.value)">
                                <span class="date-icon">📅</span>
                            </div></div>
                            <div><label for="ass-start-time-${a.id}">Start Time</label><input type="time" id="ass-start-time-${a.id}" value="${fmtTime24(s)}" step="300" ${editable ? '' : 'disabled'}></div>
                            <div><label for="ass-end-date-hidden-${a.id}">End Date</label><div class="date-wrap" onclick="showDatePicker('ass-end-date-hidden-${a.id}')">
                                <input type="text" id="ass-end-date-${a.id}" placeholder="dd-Month-yyyy" maxlength="15" readonly value="${fmtDate(e)}">
                                <input type="date" id="ass-end-date-hidden-${a.id}" onchange="syncDateDisplay('ass-end-date-${a.id}', this.value)">
                                <span class="date-icon">📅</span>
                            </div></div>
                            <div><label for="ass-end-time-${a.id}">End Time</label><input type="time" id="ass-end-time-${a.id}" value="${fmtTime24(e)}" step="300" ${editable ? '' : 'disabled'}></div>

                            </div>` : '<div class="muted" style="margin-top:10px;">No questions.</div>'}
                    </div>
                </div>`;
        }

                            <th>Start</th><th>End</th>

                        <tbody>

                                const rank = s.rank_pos || s.rank;
                                const pct = Number(s.percentage || 0);
                                if (ra) return `<tr class="row-hover" onclick="toggleStudentQA(${s.user_id}, ${s.assessment_id}, 'qa-${s.user_id}-${s.assessment_id}')">${common}
                                    <td><span class="rank-cell"><span class="rank-emoji">${rankEmoji(rank, pct)}</span></span></td>
                                    <td>${escapeHtml(s.attended || 0)} / ${escapeHtml(s.total_questions || 0)}</td>
                                    <td>${escapeHtml(s.total_score || 0)} / ${escapeHtml(s.max_marks || 0)}</td>
                                    <td>${escapeHtml(pct.toFixed(2))}%</td>
                                    <td>${escapeHtml(formatMinutes(s.total_time_taken_sec))}</td>
                                    <td>${escapeHtml(formatLocal(s.attempt_start_at))}</td>
                                    <td>${escapeHtml(formatLocal(s.submitted_at))}</td>
                                    <td><span style="font-size:12px;">▼</span></td>
                                </tr>
                                <tr id="qa-${s.user_id}-${s.assessment_id}" class="hidden"><td colspan="${cols}" style="padding:0;"></td></tr>`;
                                return `<tr class="row-hover" onclick="toggleStudentQA(${s.user_id}, ${s.assessment_id}, 'qa-${s.user_id}-${s.assessment_id}')">${common}
                                    <td><span class="badge blue">Submitted</span></td>
                                    <td>${escapeHtml(s.attended || 0)} / ${escapeHtml(s.total_questions || 0)}</td>
                                    <td>${escapeHtml(formatMinutes(s.total_time_taken_sec))}</td>
                                    <td>${escapeHtml(formatLocal(s.attempt_start_at))}</td>
                                    <td>${escapeHtml(formatLocal(s.submitted_at))}</td>
                                </tr>
                                <tr id="qa-${s.user_id}-${s.assessment_id}" class="hidden"><td colspan="${cols}" style="padding:0;"></td></tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        async function toggleStudentQA(uid, aid, rowId) {
            const row = document.getElementById(rowId);
            if (!row) return;
            const isHidden = row.classList.contains('hidden');
            if (!isHidden) { row.classList.add('hidden'); return; }
            row.classList.remove('hidden');
            const td = row.querySelector('td');
            td.innerHTML = '<div class="muted" style="padding:10px;">Loading question analysis...</div>';
            try {
                const res = await fetch(`/admin/attempt_details/${uid}/${aid}`);
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Failed');
                if (!data.length) { td.innerHTML = '<div class="muted" style="padding:10px;">No details.</div>'; return; }
                td.innerHTML = '<div class="qa-grid-2col">' + data.map((q, idx) => {
                    const score = Number(q.score || 0);
                    const good = score > 0;
                    const bad = score < 0;
                    let sResp = q.student_response || {};
                    if (typeof sResp === 'string') try { sResp = JSON.parse(sResp); } catch { sResp = {}; }
                    let studentAns = 'Skipped', correctAns = '---';
                    if (q.type === 'MCQ' || q.type === 'MSQ') {
                        const opts = q.correct_answer?.options || [];
                        const sIds = sResp.selected_ids || (sResp.selected_id !== undefined ? [sResp.selected_id] : []);
                        const cIds = q.correct_answer.correct_ids || [q.correct_answer.correct_id];
                        if (sIds.length) studentAns = sIds.map(id => opts[id]).filter(Boolean).join(', ');
                        correctAns = cIds.map(id => opts[id]).filter(Boolean).join(', ');
                    } else {
                        if (sResp.value !== undefined && sResp.value !== '') studentAns = sResp.value;
                        correctAns = q.correct_answer?.value !== undefined ? q.correct_answer.value : (q.correct_answer?.range ? `${q.correct_answer.range[0]} to ${q.correct_answer.range[1]}` : 'N/A');
                    }
                    return `<div class="analysis-item ${good ? 'good' : bad ? 'bad' : 'neutral'}">
                        <div class="analysis-head">
                            <strong>Q${idx+1} (${escapeHtml(q.type)})</strong>
                            <div class="badge ${good ? 'green' : bad ? 'orange' : 'gray'}">${score > 0 ? '+' : ''}${escapeHtml(score)}</div>
                        </div>
                        <div class="analysis-q">${escapeHtml(q.question)}</div>
                        <div class="answers">
                            <div><span class="small muted">Response</span><div>${escapeHtml(studentAns)}</div></div>
                            <div><span class="small muted">Correct</span><div>${escapeHtml(correctAns)}</div></div>
                        </div>
                    </div>`;
                }).join('') + '</div>';
            } catch (err) {
                td.innerHTML = `<div class="muted" style="padding:10px;color:var(--red);">${escapeHtml(err.message)}</div>`;
            }
        }

        async function saveAssessmentMeta(aid) {
            const statusEl = document.getElementById('assessments-status');
            const data = assessmentCache.get(aid);
            if (!data || !data.editable) {
                showStatus(statusEl, 'Assessment cannot be edited after start.', 'error');
                return;
            }
            const payload = {
                title: document.getElementById(`ass-title-${aid}`).value.trim(),
                series_no: document.getElementById(`ass-series-${aid}`).value.trim() || null,
                total_duration: parseInt(document.getElementById(`ass-duration-${aid}`).value, 10) || 30,
                question_ids: data.question_ids || []
            };
            const sa = combineDateTime(`ass-start-date-${aid}`, `ass-start-time-${aid}`);
            const ea = combineDateTime(`ass-end-date-${aid}`, `ass-end-time-${aid}`);
            if (sa) payload.start_at = sa;
            if (ea) payload.end_at = ea;
            try {
                const res = await fetch(`/admin/update_assessment/${aid}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const resp = await res.json();
                if (!res.ok) throw new Error(resp.error || 'Failed to update assessment');
                showStatus(statusEl, resp.message || 'Changes saved.', 'success');
                assessmentCache.delete(aid);
                fetchAssessmentsList();
            } catch (err) {
                showStatus(statusEl, err.message || 'Network error.', 'error');
            }
        }

        function gatherQuestions(aid) {
            const card = document.getElementById(`ass-edit-panel-${aid}`);
            if (!card) return [];
            const qCards = card.querySelectorAll('.question-card');
            return Array.from(qCards).map(qc => {
                const qid = parseInt(qc.querySelector('.q-text')?.dataset?.qid, 10);
                if (!qid) return null;
                const question = qc.querySelector('.q-text')?.value?.trim() || '';
                const mark = parseFloat(qc.querySelector('.q-mark')?.value) || 1;
                const neg = parseFloat(qc.querySelector('.q-neg')?.value) || 0;
                const type = qc.querySelector('.badge')?.textContent?.trim() || 'MCQ';

                let answer = {};
                if (type === 'MCQ' || type === 'MSQ') {
                    const optInputs = qc.querySelectorAll('.q-opt');
                    const options = Array.from(optInputs).map(inp => inp.value);
                    if (type === 'MCQ') {
                        const checked = qc.querySelector('input[type="radio"]:checked');
                        if (checked) answer.correct_id = parseInt(checked.value, 10);
                    } else {
                        const checked = qc.querySelectorAll('input[type="checkbox"]:checked');
                        const ids = Array.from(checked).map(cb => parseInt(cb.value, 10));
                        if (ids.length) answer.correct_ids = ids;
                    }
                    answer.options = options;
                } else if (type === 'INT' || type === 'NUM') {
                    const fromEl = qc.querySelector('.q-num-from');
                    const toEl = qc.querySelector('.q-num-to');
                    const valEl = qc.querySelector('.q-num-val');
                    if (fromEl && toEl) {
                        const f = parseFloat(fromEl.value);
                        const t = parseFloat(toEl.value);
                        if (!isNaN(f) && !isNaN(t)) answer.range = [f, t];
                    } else if (valEl) {
                        const v = parseFloat(valEl.value);
                        if (!isNaN(v)) answer.value = v;
                    }
                }
                return { id: qid, type, question, mark, negative_mark: neg, answer };
            }).filter(Boolean);
        }

        async function saveAssessmentQuestions(aid) {
            const statusEl = document.getElementById('assessments-status');
            const questions = gatherQuestions(aid);
            if (!questions.length) {
                showStatus(statusEl, 'No questions to save.', 'error');
                return;
            }
            try {
                const res = await fetch(`/admin/update_assessment_questions/${aid}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ questions })
                });
                const resp = await res.json();
                if (!res.ok) throw new Error(resp.error || 'Failed to save questions');
                showStatus(statusEl, resp.message || 'Questions saved.', resp.status === 'no_changes' ? 'info' : 'success');
                assessmentCache.delete(aid);
                fetchAssessmentsList();
            } catch (err) {
                showStatus(statusEl, err.message || 'Network error.', 'error');
            }
        }

        async function deleteAssessment(aid) {
            const statusEl = document.getElementById('assessments-status');
            if (!confirm('Delete this assessment?')) return;
            try {
                const res = await fetch(`/admin/delete_assessment/${aid}`, { method: 'DELETE' });
                const resp = await res.json();
                if (!res.ok) throw new Error(resp.error || 'Failed to delete assessment');
                showStatus(statusEl, 'Assessment deleted.', 'success');
                assessmentCache.delete(aid);
                fetchAssessmentsList();
            } catch (err) {
                showStatus(statusEl, err.message || 'Network error.', 'error');
            }
        }

        async function exportToExcel(aid) {
            const statusEl = document.getElementById('assessments-status');
            try {
                const res = await fetch(`/admin/export_assessment/${aid}`);
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Export failed');
                if (!data.length) {
                    showStatus(statusEl, 'No students have submitted this assessment yet.', 'error');
                    return;
                }
                const rows = data.map(r => ({
                    'Reg. No': r.user_id,
                    'Name': r.name,
                    'Rank': r.rank,
                    'Questions Attended': r.attended,
                    'Total Score': r.total_score,
                    'Max Marks': r.max_marks,
                    'Percentage': r.percentage,
                    'Time Taken (sec)': r.total_time_sec,
                    'Attempt Start': r.attempt_start_at,
                    'Attempt End': r.attempt_end_at,
                    'Submitted At': r.submitted_at
                }));
                const ws = XLSX.utils.json_to_sheet(rows);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'Results');
                XLSX.writeFile(wb, `assessment_${aid}_results.xlsx`);
                showStatus(statusEl, 'Export successful.', 'success');
            } catch (err) {
                showStatus(statusEl, err.message || 'Network error.', 'error');
            }
        }

        async function scheduleMessage() {
            const statusEl = document.getElementById('msg-status');
            const title = document.getElementById('msg-title').value.trim();
            const body = document.getElementById('msg-body').value.trim();
            const scheduleAt = combineDateTime('msg-date', 'msg-time');
            if (!title || !body) return showStatus(statusEl, 'Title and Message Body are required.', 'error');
            if (scheduleAt && new Date(scheduleAt) < new Date())
                return showStatus(statusEl, 'Schedule date/time is in the past.', 'error');
            showStatus(statusEl, 'Scheduling message...', 'info');
            try {
                const payload = { title, body };
                if (scheduleAt) payload.schedule_at = scheduleAt;
                const res = await fetch('/admin/send_message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Failed to queue message');
                showStatus(statusEl, scheduleAt ? 'Message scheduled successfully.' : 'Message queued for delivery.', 'success');
                document.getElementById('msg-title').value = '';
                document.getElementById('msg-body').value = '';
                document.getElementById('msg-date').value = '';
                document.getElementById('msg-time').value = '';
            } catch (err) {
                showStatus(statusEl, err.message || 'Network error.', 'error');
            }
        }

        async function logout() {
            await fetch('/logout');
            window.location.href = '/';
        }

        function normalizePage() {
            prefillStart();
            fetchAssessmentsList();
        }

        window.addEventListener('DOMContentLoaded', normalizePage);
    </script>
</body>
