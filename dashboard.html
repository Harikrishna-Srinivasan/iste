<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Student Performance Dashboard | ISTE</title>
    <style>
        :root {
            --primary-blue: #1976D2;
            --thick-orange: #EF6C00;
            --thick-yellow: #FDD835;
            --bg-body: #F4F6F8;
            --bg-card: #FFFFFF;
            --text-main: #202124;
            --border: #DADCE0;
            --iste-green: #2E7D32;
            --iste-red: #D32F2F;
            --overlay: rgba(0,0,0,0.5);
        }

        * { box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--bg-body); color: var(--text-main); padding-bottom: 50px; }

        .app-bar { 
            background: var(--primary-blue); color: white; padding: 12px 30px; 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 100; border-bottom: 5px solid var(--thick-yellow); 
        }

        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }

        .banner { background: var(--bg-card); border-left: 8px solid var(--primary-blue); padding: 25px; border-radius: 8px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .banner h3 { color: var(--primary-blue); margin-bottom: 10px; }
        .banner p { font-size: 14px; color: #666; margin-bottom: 15px; }

        .timer-badge { background: #fff3e0; color: #e65100; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 13px; display: inline-block; margin-bottom: 20px; }

        .btn { width: 100%; padding: 15px; background: var(--primary-blue); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: not-allowed; opacity: 0.6; transition: 0.3s; font-size: 16px; }
        .btn.active { cursor: pointer; opacity: 1; box-shadow: 0 4px 10px rgba(25, 118, 210, 0.3); }
        .btn.active:hover { filter: brightness(1.1); transform: scale(1.01); }

        .section-header { margin-top: 50px; margin-bottom: 20px; font-size: 18px; color: #555; border-bottom: 2px solid var(--border); padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }

        details.history-card { 
            background: var(--bg-card); margin-bottom: 15px; border-radius: 8px; 
            border-left: 8px solid var(--iste-green); padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        details.history-card:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        summary { cursor: pointer; font-weight: bold; list-style: none; display: flex; justify-content: space-between; align-items: center; font-size: 16px; }
        summary::-webkit-details-marker { display: none; }
        
        .res-content { margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); font-size: 14px; }
        .res-row { display: flex; justify-content: space-between; padding: 6px 0; color: #666; }

        /* Captcha Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--overlay); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 340px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        #captchaCanvas { background: #f0f0f0; border-radius: 6px; margin: 15px 0; cursor: pointer; display: block; margin-left: auto; margin-right: auto; }
        .captcha-input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 8px; text-align: center; font-size: 20px; letter-spacing: 4px; font-weight: bold; }
        
        .q-detail-row { padding: 10px; margin-top: 10px; border-radius: 6px; font-size: 13px; border: 1px solid #eee; }
        .q-ans-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; font-weight: 500; }
        .badge-mark { font-weight: bold; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
        .badge-right { background: #e8f5e9; color: #2e7d32; }
        .badge-wrong { background: #ffebee; color: #c62828; }
    </style>
</head>
<body>
    <header class="app-bar">
        <h2>ISTE Performance Portal</h2>
        <button onclick="logout()" style="background:none; border:2px solid white; color:white; padding:5px 15px; border-radius:5px; cursor:pointer;">Logout</button>
    </header>

    <div class="container" id="main-view">
        <div id="active-assessment-container">
            <div class="banner" id="test-card" style="display: none;">
                <h3 id="test-title">Loading...</h3>
                <p>Entry Opens: <span id="test-time">--:--</span> | Window Closes: <span id="until-time">--:--</span></p>
                <div id="countdown" class="timer-badge">Syncing Schedule...</div>
                <button id="start-btn" class="btn" disabled>Awaiting Window</button>
            </div>
            <div id="no-test-msg" style="text-align: center; color: #999; margin: 40px 0; display: none;">No assessments currently scheduled. Check back soon!</div>
        </div>

        <div class="section-header">Past Week Results <span>Archive</span></div>
        <div id="history-container">
            <!-- Results populated here -->
            <p style="color: #999; text-align: center;">Loading result history...</p>
        </div>
    </div>

    <!-- Captcha Modal -->
    <div id="captchaModal" class="modal">
        <div class="modal-content">
            <h4>Security Verification</h4>
            <p style="font-size: 12px; color: #666; margin-top: 5px;">Type the characters below to begin</p>
            <canvas id="captchaCanvas" width="200" height="70" onclick="generateCaptcha()"></canvas>
            <input type="text" id="captchaInput" class="captcha-input" placeholder="..." autocomplete="off">
            <button class="btn active" onclick="validateAndStart()">Verify & Launch Environment</button>
            <p style="font-size: 11px; margin-top: 15px; color: var(--primary-blue); cursor: pointer;" onclick="exitCaptcha()">Cancel</p>
        </div>
    </div>

    <script>
        let selectedAssessmentId = null;
        let correctCaptcha = "";

        async function fetchDashboard() {
            // 1. Fetch Active Assessments (List)
            const activeRes = await fetch("/student/active");
            const container = document.getElementById('active-assessment-container');
            
            if (activeRes.ok) {
                const assessments = await activeRes.json();
                if (assessments.length === 0) {
                    container.innerHTML = `<div id="no-test-msg" style="text-align: center; color: #999; margin: 40px 0;">No assessments currently scheduled. Check back soon!</div>`;
                } else {
                    container.innerHTML = assessments.map((ass, i) => `
                        <div class="banner" id="test-card-${ass.id}">
                            <h3>${ass.title}</h3>
                            <p>Entry Window: <span id="test-time-${ass.id}">--:--</span> to <span id="until-time-${ass.id}">--:--</span></p>
                            <div id="countdown-${ass.id}" class="timer-badge">Syncing Schedule...</div>
                            <button id="start-btn-${ass.id}" class="btn" onclick="openCaptcha(${ass.id})">Awaiting Window</button>
                        </div>
                    `).join('');

                    assessments.forEach(ass => {
                        const startTime = new Date(ass.start_at);
                        const untilTime = new Date(ass.start_until);
                        document.getElementById(`test-time-${ass.id}`).innerText = startTime.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                        document.getElementById(`until-time-${ass.id}`).innerText = untilTime.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                        startCountdown(ass.id, startTime, untilTime);
                    });
                }
            } else {
                container.innerHTML = `<div id="no-test-msg" style="text-align: center; color: #999; margin: 40px 0;">Error fetching assessments.</div>`;
            }

            // 2. Fetch History
            const historyRes = await fetch("/student/attempts");
            if (historyRes.ok) {
                const data = await historyRes.json();
                const container = document.getElementById('history-container');
                if (data.length === 0) {
                    container.innerHTML = "<p style='color: #999; text-align:center;'>No past attempts found.</p>";
                } else {
                    container.innerHTML = data.map(h => {
                        const scoreDisplay = h.results_available 
                            ? `<span style="color: var(--iste-green);">${h.total_score} / ${h.total_questions} ▼</span>`
                            : `<span style="color: #666; font-size:11px;">PENDING RELEASE</span>`;
                            
                        return `
                        <details class="history-card" style="border-left-color: ${h.results_available ? 'var(--iste-green)' : '#999'}" onclick="if(!this.open && ${h.results_available}) fetchDetails(${h.assessment_id})">
                            <summary>
                                <span>${h.title}</span>
                                ${scoreDisplay}
                            </summary>
                            <div class="res-content" id="details-${h.assessment_id}">
                                <div class="res-row"><span>Time Taken:</span> <span>${Math.round(h.total_time_taken_sec / 60)} mins</span></div>
                                <div class="res-row"><span>Evaluation Status:</span> <span style="font-weight:bold; color:${h.results_available ? 'var(--iste-green)' : '#EF6C00'};">${h.results_available ? 'Finalised' : 'Result Pending'}</span></div>
                                ${h.results_available ? `<div class="loading-spinner" style="padding:10px; text-align:center; font-size:12px; color:#999;">Fetching Detailed Breakdown...</div>` : '<p style="font-size:11px; margin-top:10px; color:#777;">Official evaluation will be released after the test duration concludes for all candidates.</p>'}
                            </div>
                        </details>
                    `}).join('');
                }
            }
        }

        async function fetchDetails(aid) {
            const container = document.getElementById(`details-${aid}`);
            const res = await fetch(`/student/attempt_details/${aid}`);
            if (res.ok) {
                const data = await res.json();
                container.innerHTML = `
                    <div style="border-top: 1px solid #ddd; padding-top: 15px; margin-top: 15px;">
                        <h4 style="font-size: 14px; margin-bottom: 10px; color: var(--primary-blue);">Detailed Question Analysis</h4>
                        ${data.map((q, i) => {
                            const isCorrect = q.score > 0;
                            const markClass = isCorrect ? 'badge-right' : 'badge-wrong';
                            
                            let studentAns = "No Response";
                            let correctAns = "---";
                            
                            if (q.type === 'MCQ' || q.type === 'MSQ') {
                                const sIds = q.student_response?.selected_ids || (q.student_response?.selected_id !== undefined ? [q.student_response.selected_id] : []);
                                const cIds = q.correct_answer.correct_ids || [q.correct_answer.correct_id];
                                
                                studentAns = sIds.map(id => q.correct_answer.options[id]).join(', ') || "Awaiting Response";
                                correctAns = cIds.map(id => q.correct_answer.options[id]).join(', ');
                            } else {
                                studentAns = q.student_response?.value || "Empty";
                                correctAns = q.correct_answer.value || (q.correct_answer.range ? `${q.correct_answer.range[0]} to ${q.correct_answer.range[1]}` : "N/A");
                            }

                            return `
                            <div class="q-detail-row">
                                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                                    <strong>Q${i+1}: ${q.type}</strong>
                                    <span class="badge-mark ${markClass}">${isCorrect ? '+' : ''}${q.score} Points</span>
                                </div>
                                <div style="color: #444; margin-bottom:8px;">${q.question}</div>
                                <div class="q-ans-box">
                                    <div style="font-size: 11px;">Your Response:<br><span style="color:${isCorrect ? '#2e7d32' : '#c62828'}">${studentAns}</span></div>
                                    <div style="font-size: 11px;">Correct Answer:<br><span style="color:#2e7d32">${correctAns}</span></div>
                                </div>
                            </div>
                            `;
                        }).join('')}
                    </div>
                `;
            }
        }

        function startCountdown(id, startTime, untilTime) {
            const btn = document.getElementById(`start-btn-${id}`);
            const countdownEl = document.getElementById(`countdown-${id}`);
            
            const ticker = setInterval(() => {
                const now = new Date();
                if (now < startTime) {
                    const diff = startTime - now;
                    const h = Math.floor(diff / 3600000);
                    const m = Math.floor((diff % 3600000) / 60000);
                    const s = Math.floor((diff % 60000) / 1000);
                    countdownEl.innerText = `Window opens in: ${h}h ${m}m ${s}s`;
                    btn.innerText = "Entry Closed";
                    btn.classList.remove('active');
                    btn.disabled = true;
                } else if (now >= startTime && now <= untilTime) {
                    countdownEl.innerText = "ENTRY WINDOW IS ACTIVE";
                    countdownEl.style.background = "#e8f5e9";
                    countdownEl.style.color = "#2e7d32";
                    btn.classList.add('active');
                    btn.disabled = false;
                    btn.innerText = "Access Assessment Environment";
                } else {
                    clearInterval(ticker);
                    countdownEl.innerText = "ENTRY WINDOW HAS EXPIRED";
                    countdownEl.style.background = "#ffebee";
                    countdownEl.style.color = "#c62828";
                    btn.classList.remove('active');
                    btn.disabled = true;
                    btn.innerText = "Window Expired";
                }
            }, 1000);
        }

        function openCaptcha(id) {
            selectedAssessmentId = id;
            document.getElementById('captchaModal').style.display = 'flex';
            generateCaptcha();
        }

        function exitCaptcha() { document.getElementById('captchaModal').style.display = 'none'; }

        function generateCaptcha() {
            const canvas = document.getElementById('captchaCanvas');
            const ctx = canvas.getContext('2d');
            const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            correctCaptcha = "";
            ctx.fillStyle = "#f8f9fa";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = "bold 32px 'Courier New'";
            ctx.textBaseline = 'middle';
            for (let i = 0; i < 5; i++) {
                const char = chars.charAt(Math.floor(Math.random() * chars.length));
                correctCaptcha += char;
                ctx.save();
                ctx.translate(35 + (i * 35), 35);
                ctx.rotate((Math.random() - 0.5) * 0.4);
                ctx.fillStyle = "#1976D2";
                ctx.fillText(char, 0, 0);
                ctx.restore();
            }
        }

        function validateAndStart() {
            const input = document.getElementById('captchaInput').value.toUpperCase();
            if (input !== correctCaptcha) {
                alert("Security Code Mismatch.");
                generateCaptcha();
                document.getElementById('captchaInput').value = "";
                return;
            }
            // Store selected ID for test page session
            sessionStorage.setItem('joining_assessment_id', selectedAssessmentId);
            window.location.href = "/test";
        }

        async function logout() {
            await fetch("/logout");
            window.location.href = "/";
        }

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.getElementById('captchaModal').style.display === 'flex') {
                validateAndStart();
            }
        });

        window.onload = fetchDashboard;
    </script>
</body>
</html>
