<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISTE Admin Access</title>
    <link rel="icon" type="image/png" href="/iste.png">
    <style>
        :root {
            --admin: #5E35B1;
            --bg: #f3e5f5;
            --muted: #86868b;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 350px;
            border-top: 8px solid var(--admin);
        }

        h2 {
            text-align: center;
            color: var(--admin);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--admin);
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #4527a0;
        }

        .error {
            color: #d32f2f;
            font-size: 13px;
            text-align: center;
            display: none;
            padding: 10px;
            background: #ffebee;
            border-radius: 4px;
            margin-top: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 340px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        #captchaCanvas {
            background: #f0f0f0;
            border-radius: 6px;
            margin: 15px auto;
            cursor: pointer;
            display: block;
        }
        .captcha-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-align: center;
            font-size: 20px;
            letter-spacing: 4px;
            font-weight: bold;
            box-sizing: border-box;
        }

        @media screen and (max-width: 480px) {
            .card {
                padding: 25px 20px;
                border-radius: 10px;
            }
            .card img {
                width: 50px;
                height: 50px;
            }
            input {
                padding: 10px;
                font-size: 14px;
            }
            button {
                padding: 12px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div style="display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:8px;">
            <img src="sastra.png" alt="SASTRA Logo" style="display:block; width:50px; height:50px; object-fit:contain;">
            <img src="iste.png" alt="ISTE Logo" style="display:block; width:60px; height:60px;">
        </div>
        <div style="text-align:center; margin-bottom:4px;">
            <div style="font-weight:700; font-size:13px; color:var(--admin); letter-spacing:-0.01em; line-height:1.3;">SASTRA DEEMED TO BE UNIVERSITY</div>
            <div style="font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.04em; line-height:1.3;">Srinivasa Ramanujan Centre, Kumbakonam</div>
        </div>
        <h2>Admin Portal</h2>
        <form onsubmit="event.preventDefault(); startLoginFlow();">
            <input type="text" id="user" placeholder="Admin Username" autocomplete="username">
            <input type="password" id="pass" placeholder="Admin Password" autocomplete="current-password">
            <button type="submit">Log In</button>
        </form>
        <div id="err" class="error">Access Denied. Internal Credentials Error.</div>
    </div>

    <div id="captchaModal" class="modal">
        <div class="modal-content">
            <h4 style="color:var(--admin);">Security Verification</h4>
            <p style="font-size:12px;color:#666;margin-top:5px;">Type the characters from the image</p>
            <canvas id="captchaCanvas" width="200" height="70" onclick="generateCaptcha()"></canvas>
            <input type="text" id="captchaInput" class="captcha-input" autocomplete="off">
            <button onclick="validateAndLogin()" style="width:100%;padding:12px;background:var(--admin);color:white;border:none;border-radius:8px;font-weight:bold;cursor:pointer;">Verify Captcha</button>
            <p style="font-size:11px;margin-top:15px;color:var(--admin);cursor:pointer;" onclick="generateCaptcha()">Refresh Image</p>
        </div>
    </div>

    <script>
        let _captchaAns = "";

        function startLoginFlow() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            if (!user || !pass) return alert("All fields required");
            document.getElementById('captchaModal').style.display = 'flex';
            const capInput = document.getElementById('captchaInput');
            capInput.value = '';
            capInput.focus();
            generateCaptcha();
        }

        function generateCaptcha() {
            const chars = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789@#$&*";
            let code = "";
            for (let i = 0; i < 5; i++) code += chars[Math.floor(Math.random() * chars.length)];
            _captchaAns = code;
            drawAdvancedCaptcha("captchaCanvas", _captchaAns);
        }

        function drawAdvancedCaptcha(canvasId, code) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const fonts = ["'Courier New'", "Arial", "Georgia", "Impact", "Tahoma"];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#F8F9FA";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 15) {
                ctx.beginPath(); ctx.moveTo(x + (Math.random()*4-2), 0); ctx.lineTo(x + (Math.random()*4-2), canvas.height);
                ctx.strokeStyle = `rgba(0,0,0,${Math.random()*0.05+0.02})`; ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += 15) {
                ctx.beginPath(); ctx.moveTo(0, y + (Math.random()*4-2)); ctx.lineTo(canvas.width, y + (Math.random()*4-2));
                ctx.strokeStyle = `rgba(0,0,0,${Math.random()*0.05+0.02})`; ctx.stroke();
            }
            for (let i = 0; i < 20; i++) {
                ctx.beginPath();
                let x = Math.random()*canvas.width, y = Math.random()*canvas.height;
                ctx.moveTo(x, y); ctx.lineTo(x + Math.random()*15-7, y + Math.random()*15-7);
                ctx.strokeStyle = `rgba(0,0,0,${Math.random()*0.3})`; ctx.lineWidth = Math.random()*1.5+0.5; ctx.stroke();
            }
            const stepX = canvas.width / (code.length + 1);
            for (let i = 0; i < code.length; i++) {
                ctx.save();
                ctx.translate((i+1)*stepX + (Math.random()*10-5), canvas.height/2 + (Math.random()*8-4));
                ctx.rotate((Math.random()-0.5)*0.8);
                ctx.transform(1, 0, Math.random()*0.4-0.2, 1, 0, 0);
                ctx.font = `${Math.floor(canvas.height*0.5+Math.random()*(canvas.height*0.25))}px ${fonts[Math.floor(Math.random()*fonts.length)]}`;
                const r = Math.floor(Math.random()*120), g = Math.floor(Math.random()*120), b = Math.floor(Math.random()*150+50);
                ctx.fillStyle = `rgb(${r},${g},${b})`;
                ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowOffsetX = 1.5; ctx.shadowOffsetY = 1.5; ctx.shadowBlur = 2;
                ctx.fillText(code[i], -ctx.measureText(code[i]).width/2, 0);
                ctx.shadowColor = 'transparent';
                if (Math.random() > 0.2) {
                    ctx.beginPath(); ctx.moveTo(-15, (Math.random()-0.5)*15); ctx.lineTo(15, (Math.random()-0.5)*15);
                    ctx.strokeStyle = `rgba(${r},${g},${b},${Math.random()*0.9+0.3})`; ctx.lineWidth = Math.random()*2+1; ctx.stroke();
                }
                ctx.restore();
            }
            for (let i = 0; i < 15; i++) {
                const x = Math.random()*canvas.width, y = Math.random()*canvas.height;
                const r = Math.floor(Math.random()*200), g = Math.floor(Math.random()*200), b = Math.floor(Math.random()*200);
                ctx.fillStyle = `rgba(${r},${g},${b},${Math.random()*0.5+0.3})`;
                ctx.beginPath(); ctx.arc(x, y, Math.random()*3, 0, 2*Math.PI); ctx.fill();
            }
        }

        async function validateAndLogin() {
            const input = document.getElementById('captchaInput').value;
            if (!input) return alert("Please enter the security code.");
            if (input !== _captchaAns) {
                generateCaptcha();
                document.getElementById('captchaInput').value = '';
                return alert("Wrong code. Try again.");
            }
            document.getElementById('captchaModal').style.display = 'none';
            doLogin();
        }

        async function doLogin() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;

            const errDiv = document.getElementById('err');
            errDiv.style.display = 'none';

            try {
                const res = await fetch("/admin/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user, password: pass })
                });
                const data = await res.json();
                if (res.ok) {
                    window.location.href = "/";
                } else {
                    errDiv.textContent = data.error || "Login failed";
                    errDiv.style.display = 'block';
                }
            } catch (e) {
                errDiv.textContent = "Server error";
                errDiv.style.display = 'block';
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (document.getElementById('captchaModal').style.display === 'flex') validateAndLogin();
                else startLoginFlow();
            }
        });
    </script>
</body>

</html>
