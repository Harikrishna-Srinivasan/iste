<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISTE Admin Access</title>
    <link rel="icon" type="image/png" href="/iste.png">
    <style>
        :root {
            --admin: #5E35B1;
            --bg: #f3e5f5;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 350px;
            border-top: 8px solid var(--admin);
        }

        h2 {
            text-align: center;
            color: var(--admin);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--admin);
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #4527a0;
        }

        .error {
            color: #d32f2f;
            font-size: 13px;
            text-align: center;
            display: none;
        }

        @media screen and (max-width: 480px) {
            .card {
                padding: 25px 20px;
                border-radius: 10px;
            }
            .card img {
                width: 50px;
                height: 50px;
            }
            input {
                padding: 10px;
                font-size: 14px;
            }
            button {
                padding: 12px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div style="display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:8px;">
            <img src="sastra.png" alt="SASTRA Logo" style="display:block; width:50px; height:50px; object-fit:contain;">
            <img src="iste.png" alt="ISTE Logo" style="display:block; width:60px; height:60px;">
        </div>
        <h2>Admin Portal</h2>
        <form onsubmit="event.preventDefault(); doLogin();">
            <input type="text" id="user" placeholder="Admin Username" autocomplete="username">
            <input type="password" id="pass" placeholder="Admin Password" autocomplete="current-password">
            <button type="submit">Authenticate</button>
        </form>
        <div id="err" class="error">Access Denied. Internal Credentials Error.</div>
    </div>

    <script>
        async function doLogin() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            if (!user || !pass) return alert("All fields required");

            const errDiv = document.getElementById('err');
            errDiv.style.display = 'none';

            try {
                const res = await fetch("/admin/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user, password: pass })
                });
                const data = await res.json();
                if (res.ok) {
                    window.location.href = "/admin";
                } else {
                    errDiv.textContent = data.error || "Login failed";
                    errDiv.style.display = 'block';
                }
            } catch (e) {
                errDiv.textContent = "Server error";
                errDiv.style.display = 'block';
            }
        }
    </script>
</body>

</html>
