<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISTE Admin Access</title>
    <style>
        :root { --admin: #5E35B1; --bg: #f3e5f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 350px; border-top: 8px solid var(--admin); }
        h2 { text-align: center; color: var(--admin); }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--admin); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #4527a0; }
        .error { color: #d32f2f; font-size: 13px; text-align: center; display: none; }

        /* Captcha Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 320px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.2); color: #333; }
        #captchaCanvas { background: #f0f0f0; border-radius: 4px; margin: 15px 0; cursor: pointer; }
        .captcha-input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 5px; text-align: center; font-size: 18px; letter-spacing: 4px; box-sizing: border-box; }
        .btn-verify { width: 100%; padding: 12px; background: var(--admin); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Admin Portal</h2>
        <input type="text" id="user" placeholder="Admin Username">
        <input type="password" id="pass" placeholder="Admin Password">
        <button onclick="startLoginFlow()">Authenticate</button>
        <div id="err" class="error">Access Denied. Internal Credentials Error.</div>
    </div>

    <!-- Captcha Modal -->
    <div id="captchaModal" class="modal">
        <div class="modal-content">
            <h4>Security Check</h4>
            <p style="font-size: 12px; color: #666;">Enter the characters shown below</p>
            <canvas id="captchaCanvas" width="200" height="70" onclick="generateCaptcha()"></canvas>
            <input type="text" id="captchaInput" class="captcha-input" placeholder="Type here..." autocomplete="off">
            <button class="btn-verify" onclick="validateAndLogin()">Verify & Log In</button>
            <p style="font-size: 11px; margin-top: 10px; color: var(--admin); cursor: pointer;" onclick="generateCaptcha()">Refresh Image</p>
        </div>
    </div>

    <script>
        let correctCaptcha = "";

        function startLoginFlow() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            if (!user || !pass) return alert("All fields required");
            
            document.getElementById('captchaModal').style.display = 'flex';
            generateCaptcha();
        }

        function generateCaptcha() {
            const canvas = document.getElementById('captchaCanvas');
            const ctx = canvas.getContext('2d');
            const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789@%";
            correctCaptcha = "";

            ctx.fillStyle = "#f0f0f0";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < 10; i++) {
                ctx.strokeStyle = `rgba(${Math.random()*255}, ${Math.random()*255}, ${Math.random()*255}, 0.3)`;
                ctx.beginPath();
                ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
                ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
                ctx.stroke();
            }

            for (let i = 0; i < 50; i++) {
                ctx.fillStyle = `rgba(${Math.random()*255}, ${Math.random()*255}, ${Math.random()*255}, 0.5)`;
                ctx.beginPath();
                ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, Math.random()*2+1, 0, 2*Math.PI);
                ctx.fill();
            }

            const charCount = 6;
            for (let i = 0; i < charCount; i++) {
                const char = chars.charAt(Math.floor(Math.random() * chars.length));
                correctCaptcha += char;

                ctx.save();
                ctx.translate(25 + i * 30 + Math.random()*10, 35 + Math.random()*10 - 5);
                ctx.rotate((Math.random() - 0.5) * 0.5); // rotate slightly
                ctx.font = `${20 + Math.floor(Math.random()*10)}px Arial`;
                ctx.fillStyle = `rgb(${Math.floor(Math.random()*150)}, ${Math.floor(Math.random()*150)}, ${Math.floor(Math.random()*150)})`;
                ctx.fillText(char, 0, 0);
                ctx.restore();
            }
        }

        async function validateAndLogin() {
            const input = document.getElementById('captchaInput').value.toUpperCase();
            if (input !== correctCaptcha) {
                alert("Incorrect CAPTCHA.");
                generateCaptcha();
                document.getElementById('captchaInput').value = "";
                return;
            }
            
            document.getElementById('captchaModal').style.display = 'none';
            await login();
        }

        async function login() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            const res = await fetch("/admin/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ user, password: pass })
            });

            if (res.ok) window.location.href = "/admin";
            else document.getElementById('err').style.display = 'block';
        }

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (document.getElementById('captchaModal').style.display === 'flex') validateAndLogin();
                else startLoginFlow();
            }
        });
    </script>
</body>
</html>
